name: build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            desktop-file-utils \
            file \
            libfuse2 \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            rpm \
            squashfs-tools \
            wget

      - name: Install npm dependencies
        run: npm install

      - name: Build Linux bundles
        id: build_linux
        run: npm run tauri build -- --bundles deb,rpm

      - uses: actions/upload-artifact@v4
        if: always() && steps.build_linux.conclusion == 'success'
        with:
          name: belgeselsemoflix-1.0-linux-core
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm

      - name: Build AppImage from deb with appimage-builder
        if: steps.build_linux.conclusion == 'success'
        run: |
          APPIMAGE_OUT="/tmp/belgeselsemoflix-appimage"
          APPIMAGE_WORK="$(mktemp -d)"
          rm -rf "$APPIMAGE_OUT"
          mkdir -p "$APPIMAGE_OUT"
          DEB_PATH="$(find src-tauri/target/release/bundle/deb -maxdepth 1 -type f -name '*.deb' | head -n 1)"
          if [ -z "$DEB_PATH" ]; then
            echo "deb paketi bulunamadi"
            exit 1
          fi
          dpkg-deb -x "$DEB_PATH" "$APPIMAGE_WORK/AppDir"
          test -x "$APPIMAGE_WORK/AppDir/usr/bin/belgeselsemoflix"
          test -f "$APPIMAGE_WORK/AppDir/usr/share/applications/belgeselsemoflix.desktop"
          curl -fsSL -o /tmp/appimage-builder.AppImage \
            https://github.com/AppImageCrafters/appimage-builder/releases/download/v1.1.0/appimage-builder-1.1.0-x86_64.AppImage
          chmod +x /tmp/appimage-builder.AppImage
          (
            cd "$APPIMAGE_WORK"
            ARCH=x86_64 /tmp/appimage-builder.AppImage --appimage-extract-and-run \
              --recipe "$GITHUB_WORKSPACE/.github/appimage-builder.yml" \
              --skip-test
          )
          find "$APPIMAGE_WORK" -maxdepth 1 -type f -name '*.AppImage' ! -name 'appimage-builder*.AppImage' -exec mv {} "$APPIMAGE_OUT"/ \;

      - name: Convert deb to zst with debtap
        if: steps.build_linux.conclusion == 'success'
        run: |
          mkdir -p dist/zst
          docker run --rm \
            -v "${PWD}:/work" \
            archlinux:latest \
            /bin/bash -lc '
              set -e
              pacman -Sy --noconfirm base-devel binutils libarchive zstd fakeroot
              useradd -m builder
              mkdir -p /tmp/archpkg/ar /tmp/archpkg/pkgroot /tmp/archpkg/src /work/dist/zst
              DEB_PATH="$(find /work/src-tauri/target/release/bundle/deb -maxdepth 1 -type f -name "*.deb" | head -n 1)"
              if [ -z "$DEB_PATH" ]; then
                echo "deb paketi bulunamadi"
                exit 1
              fi
              cp "$DEB_PATH" /tmp/archpkg/package.deb
              cd /tmp/archpkg/ar
              bsdtar -xf ../package.deb
              DATA_TAR="$(find . -maxdepth 1 -type f -name "data.tar.*" | head -n 1)"
              if [ -z "$DATA_TAR" ]; then
                echo "data.tar arsivi bulunamadi"
                exit 1
              fi
              bsdtar -xf "$DATA_TAR" -C /tmp/archpkg/pkgroot
              printf "%s\n" \
                "pkgname=belgeselsemoflix" \
                "pkgver=1.0.0" \
                "pkgrel=1" \
                "pkgdesc=\"BELGESELSEMOFLIX 1.0\"" \
                "arch=(\"x86_64\")" \
                "license=()" \
                "options=(!debug)" \
                "depends=(\"cairo\" \"gdk-pixbuf2\" \"glibc\" \"libsoup3\" \"gtk3\" \"webkit2gtk-4.1\" \"glib2\" \"libgcc\")" \
                "package() {" \
                "  cp -a /tmp/archpkg/pkgroot/. \"\$pkgdir\"/" \
                "}" \
                > /tmp/archpkg/src/PKGBUILD
              chown -R builder:builder /tmp/archpkg/src /tmp/archpkg/pkgroot /work/dist/zst
              cd /tmp/archpkg/src
              runuser -u builder -- makepkg -f --nodeps --noconfirm
              cp ./belgeselsemoflix-*.pkg.tar.zst /work/dist/zst/
            '

      - uses: actions/upload-artifact@v4
        if: always() && steps.build_linux.conclusion == 'success'
        with:
          name: belgeselsemoflix-1.0-linux-appimage
          path: |
            /tmp/belgeselsemoflix-appimage/*.AppImage

      - uses: actions/upload-artifact@v4
        if: always() && steps.build_linux.conclusion == 'success'
        with:
          name: belgeselsemoflix-1.0-linux-zst
          path: |
            dist/zst/*.zst

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm install

      - name: Download bundled PHP for Windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "runtime/windows" | Out-Null
          Invoke-WebRequest "https://windows.php.net/downloads/releases/php-8.5.1-nts-Win32-vs17-x64.zip" -OutFile "runtime/windows/php.zip"
          Expand-Archive -Path "runtime/windows/php.zip" -DestinationPath "runtime/windows/php" -Force
          $phpExe = Get-ChildItem "runtime/windows/php" -Filter php.exe -Recurse | Select-Object -First 1
          if (-not $phpExe) { throw "Bundled php.exe bulunamadi" }
          $phpDir = $phpExe.DirectoryName
          Copy-Item "$env:SystemRoot\\System32\\vcruntime140.dll" $phpDir -Force -ErrorAction SilentlyContinue
          Copy-Item "$env:SystemRoot\\System32\\vcruntime140_1.dll" $phpDir -Force -ErrorAction SilentlyContinue
          Copy-Item "$env:SystemRoot\\System32\\msvcp140.dll" $phpDir -Force -ErrorAction SilentlyContinue
          @'
          [PHP]
          engine=On
          short_open_tag=Off
          precision=14
          output_buffering=0
          zlib.output_compression=Off
          implicit_flush=On
          serialize_precision=-1
          max_execution_time=120
          max_input_time=60
          memory_limit=512M
          error_reporting=E_ALL
          display_errors=On
          display_startup_errors=On
          log_errors=On
          default_charset="UTF-8"
          allow_url_fopen=On
          extension_dir="ext"
          extension=curl
          extension=openssl
          extension=mbstring
          extension=fileinfo
          curl.cainfo=
          openssl.cafile=
'@ | Set-Content -Path "$phpDir\\php.ini" -Encoding ASCII
          & $phpExe.FullName -c "$phpDir\\php.ini" -v

      - name: Build Windows installer
        run: npm run tauri build -- --bundles nsis

      - name: Smoke test bundled PHP startup on Windows
        shell: pwsh
        run: |
          $env:BELGESELSEMOFLIX_PORT = "8123"
          $stdoutLog = Join-Path $PWD "windows-startup-smoke.stdout.log"
          $stderrLog = Join-Path $PWD "windows-startup-smoke.stderr.log"
          $process = Start-Process -FilePath "cmd.exe" -ArgumentList "/c", "run.bat" -WorkingDirectory $PWD -PassThru -RedirectStandardOutput $stdoutLog -RedirectStandardError $stderrLog
          try {
            $ready = $false
            for ($i = 0; $i -lt 30; $i++) {
              Start-Sleep -Seconds 2
              if ($process.HasExited) {
                throw "run.bat erken kapandi. STDOUT:`n$(Get-Content $stdoutLog -Raw)`nSTDERR:`n$(Get-Content $stderrLog -Raw)"
              }
              try {
                $response = Invoke-WebRequest "http://127.0.0.1:8123/index.php" -UseBasicParsing -TimeoutSec 5
                if ($response.StatusCode -eq 200) {
                  $ready = $true
                  break
                }
              } catch {
              }
            }
            if (-not $ready) {
              throw "Windows smoke test zamaninda hazir olmadi. STDOUT:`n$(Get-Content $stdoutLog -Raw)`nSTDERR:`n$(Get-Content $stderrLog -Raw)"
            }
          } finally {
            if (-not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
          }

      - uses: actions/upload-artifact@v4
        with:
          name: belgeselsemoflix-1.0-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            windows-startup-smoke.stdout.log
            windows-startup-smoke.stderr.log

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm install

      - name: Ensure PHP is available on macOS
        run: |
          brew list php >/dev/null 2>&1 || brew install php

      - name: Build macOS bundles
        run: npm run tauri build -- --bundles app,dmg

      - name: Capture macOS runtime logs and screenshots
        run: |
          mkdir -p screenshots diagnostic-reports
          APP_PATH="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "macOS uygulama paketi bulunamadi"
            exit 1
          fi

          EXECUTABLE_PATH="$APP_PATH/Contents/MacOS/BELGESELSEMOFLIX"
          "$EXECUTABLE_PATH" > macos-runtime.log 2>&1 &
          APP_PID=$!
          for index in 1 2 3 4; do
            sleep 15
            screencapture -x "screenshots/belgeselsemoflix-${index}.png"
          done
          kill "$APP_PID" || true
          wait "$APP_PID" || true
          find "$HOME/Library/Logs/DiagnosticReports" -maxdepth 1 \( -name 'BELGESELSEMOFLIX*.ips' -o -name 'BELGESELSEMOFLIX*.crash' \) -exec cp {} diagnostic-reports/ \; || true

      - name: Zip macOS screenshots
        run: |
          ditto -c -k --sequesterRsrc --keepParent screenshots macos-screenshots.zip

      - name: Zip macOS crash logs
        run: |
          ditto -c -k --sequesterRsrc --keepParent diagnostic-reports macos-diagnostic-reports.zip

      - uses: actions/upload-artifact@v4
        with:
          name: belgeselsemoflix-1.0-macos
          path: |
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/dmg/*.dmg
            macos-runtime.log
            macos-screenshots.zip
            macos-diagnostic-reports.zip
