name: build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            rpm \
            wget

      - name: Install npm dependencies
        run: npm install

      - name: Build Linux bundles
        id: build_linux
        run: npm run tauri build -- --bundles deb,rpm,appimage

      - uses: actions/upload-artifact@v4
        if: always() && steps.build_linux.conclusion == 'success'
        with:
          name: belgeselsemoflix-1.0-linux-core
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Convert deb to zst with debtap
        run: |
          mkdir -p dist/zst
          docker run --rm \
            -v "${PWD}:/work" \
            archlinux:latest \
            /bin/bash -lc '
              set -e
              pacman -Sy --noconfirm base-devel git sudo fakeroot binutils pacman-contrib
              useradd -m builder
              echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
              su - builder -c "
                git clone https://aur.archlinux.org/debtap.git ~/debtap
                cd ~/debtap
                makepkg -si --noconfirm
              "
              yes | debtap -u
              mkdir -p /tmp/debtap-work
              cp /work/src-tauri/target/release/bundle/deb/*.deb /tmp/debtap-work/
              cd /tmp/debtap-work
              debtap -p ./*.deb
              PKG_DIR="$(find /tmp/debtap-work -maxdepth 1 -type d -name '*-PKGBUILD' | head -n 1)"
              if [ -z "$PKG_DIR" ]; then
                echo "debtap PKGBUILD klasoru bulunamadi"
                exit 1
              fi
              sed -i "s/'gtk'/'gtk3'/g" "$PKG_DIR/PKGBUILD"
              chown -R builder:builder "$PKG_DIR"
              su - builder -c "cd '$PKG_DIR' && makepkg -f --noconfirm"
              mv "$PKG_DIR"/*.pkg.tar.zst /work/dist/zst/
            '

      - uses: actions/upload-artifact@v4
        with:
          name: belgeselsemoflix-1.0-linux-zst
          path: |
            dist/zst/*.zst

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm install

      - name: Download bundled PHP for Windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "runtime/windows" | Out-Null
          Invoke-WebRequest "https://windows.php.net/downloads/releases/php-8.4.13-nts-Win32-vs17-x64.zip" -OutFile "runtime/windows/php.zip"
          Expand-Archive -Path "runtime/windows/php.zip" -DestinationPath "runtime/windows/php" -Force

      - name: Build Windows installer
        run: npm run tauri build -- --bundles nsis

      - uses: actions/upload-artifact@v4
        with:
          name: belgeselsemoflix-1.0-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm install

      - name: Ensure PHP is available on macOS
        run: |
          brew list php >/dev/null 2>&1 || brew install php

      - name: Build macOS bundles
        run: npm run tauri build -- --bundles app,dmg

      - name: Capture macOS runtime logs and screenshots
        run: |
          mkdir -p screenshots diagnostic-reports
          APP_PATH="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "macOS uygulama paketi bulunamadi"
            exit 1
          fi

          EXECUTABLE_PATH="$APP_PATH/Contents/MacOS/BELGESELSEMOFLIX"
          "$EXECUTABLE_PATH" > macos-runtime.log 2>&1 &
          APP_PID=$!
          for index in 1 2 3 4; do
            sleep 15
            screencapture -x "screenshots/belgeselsemoflix-${index}.png"
          done
          kill "$APP_PID" || true
          wait "$APP_PID" || true
          find "$HOME/Library/Logs/DiagnosticReports" -maxdepth 1 \( -name 'BELGESELSEMOFLIX*.ips' -o -name 'BELGESELSEMOFLIX*.crash' \) -exec cp {} diagnostic-reports/ \; || true

      - name: Zip macOS screenshots
        run: |
          ditto -c -k --sequesterRsrc --keepParent screenshots macos-screenshots.zip

      - name: Zip macOS crash logs
        run: |
          ditto -c -k --sequesterRsrc --keepParent diagnostic-reports macos-diagnostic-reports.zip

      - uses: actions/upload-artifact@v4
        with:
          name: belgeselsemoflix-1.0-macos
          path: |
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/dmg/*.dmg
            macos-runtime.log
            macos-screenshots.zip
            macos-diagnostic-reports.zip
