name: build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            desktop-file-utils \
            file \
            libfuse2 \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            rpm \
            squashfs-tools \
            wget

      - name: Install npm dependencies
        run: npm install

      - name: Build Linux bundles
        id: build_linux
        run: npm run tauri build -- --bundles deb,rpm

      - name: Build AppImage from deb
        if: steps.build_linux.conclusion == 'success'
        run: bash scripts/build-appimage-from-deb.sh

      - name: Convert deb to zst with debtap
        if: steps.build_linux.conclusion == 'success'
        run: |
          mkdir -p dist/zst
          docker run --rm \
            -v "${PWD}:/work" \
            archlinux:latest \
            /bin/bash -lc '
              set -e
              pacman -Sy --noconfirm base-devel binutils libarchive zstd fakeroot
              useradd -m builder
              mkdir -p /tmp/archpkg/ar /tmp/archpkg/pkgroot /tmp/archpkg/src /work/dist/zst
              DEB_PATH="$(find /work/src-tauri/target/release/bundle/deb -maxdepth 1 -type f -name "*.deb" | head -n 1)"
              if [ -z "$DEB_PATH" ]; then
                echo "deb paketi bulunamadi"
                exit 1
              fi
              cp "$DEB_PATH" /tmp/archpkg/package.deb
              cd /tmp/archpkg/ar
              bsdtar -xf ../package.deb
              DATA_TAR="$(find . -maxdepth 1 -type f -name "data.tar.*" | head -n 1)"
              if [ -z "$DATA_TAR" ]; then
                echo "data.tar arsivi bulunamadi"
                exit 1
              fi
              bsdtar -xf "$DATA_TAR" -C /tmp/archpkg/pkgroot
              printf "%s\n" \
                "pkgname=belgeselsemoflix" \
                "pkgver=1.0.0" \
                "pkgrel=1" \
                "pkgdesc=\"BELGESELSEMOFLIX 1.0\"" \
                "arch=(\"x86_64\")" \
                "license=()" \
                "options=(!debug)" \
                "depends=(\"cairo\" \"gdk-pixbuf2\" \"glibc\" \"libsoup3\" \"gtk3\" \"webkit2gtk-4.1\" \"glib2\" \"libgcc\")" \
                "package() {" \
                "  cp -a /tmp/archpkg/pkgroot/. \"\$pkgdir\"/" \
                "}" \
                > /tmp/archpkg/src/PKGBUILD
              chown -R builder:builder /tmp/archpkg/src /tmp/archpkg/pkgroot /work/dist/zst
              cd /tmp/archpkg/src
              runuser -u builder -- makepkg -f --nodeps --noconfirm
              cp ./belgeselsemoflix-*.pkg.tar.zst /work/dist/zst/
            '

      - name: Prepare Linux artifact bundle
        if: always() && steps.build_linux.conclusion == 'success'
        run: |
          rm -rf release-artifacts/linux
          mkdir -p release-artifacts/linux
          cp src-tauri/target/release/bundle/deb/*.deb release-artifacts/linux/
          cp src-tauri/target/release/bundle/rpm/*.rpm release-artifacts/linux/
          cp /tmp/belgeselsemoflix-appimage/*.AppImage release-artifacts/linux/
          cp dist/zst/*.zst release-artifacts/linux/

      - uses: actions/upload-artifact@v4
        if: always() && steps.build_linux.conclusion == 'success'
        with:
          name: belgeselsemoflix-1.0-linux
          path: release-artifacts/linux/

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm install

      - name: Download bundled PHP for Windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "runtime/windows" | Out-Null
          Invoke-WebRequest "https://windows.php.net/downloads/releases/php-8.5.1-nts-Win32-vs17-x64.zip" -OutFile "runtime/windows/php.zip"
          Expand-Archive -Path "runtime/windows/php.zip" -DestinationPath "runtime/windows/php" -Force
          $phpExe = Get-ChildItem "runtime/windows/php" -Filter php.exe -Recurse | Select-Object -First 1
          if (-not $phpExe) { throw "Bundled php.exe bulunamadi" }
          $phpDir = $phpExe.DirectoryName
          Copy-Item "$env:SystemRoot\\System32\\vcruntime140.dll" $phpDir -Force -ErrorAction SilentlyContinue
          Copy-Item "$env:SystemRoot\\System32\\vcruntime140_1.dll" $phpDir -Force -ErrorAction SilentlyContinue
          Copy-Item "$env:SystemRoot\\System32\\msvcp140.dll" $phpDir -Force -ErrorAction SilentlyContinue
          $phpIniLines = @(
            '[PHP]',
            'engine=On',
            'short_open_tag=Off',
            'precision=14',
            'output_buffering=0',
            'zlib.output_compression=Off',
            'implicit_flush=On',
            'serialize_precision=-1',
            'max_execution_time=0',
            'max_input_time=-1',
            'memory_limit=2048M',
            'post_max_size=1024M',
            'upload_max_filesize=1024M',
            'max_file_uploads=200',
            'default_socket_timeout=300',
            'error_reporting=E_ALL',
            'display_errors=On',
            'display_startup_errors=On',
            'log_errors=On',
            'default_charset="UTF-8"',
            'allow_url_fopen=On',
            'allow_url_include=Off',
            'extension_dir="ext"',
            'extension=curl',
            'extension=openssl',
            'extension=mbstring',
            'extension=fileinfo',
            'extension=sodium',
            'curl.cainfo=',
            'openssl.cafile='
          )
          $phpIniLines | Set-Content -Path "$phpDir\\php.ini" -Encoding ASCII
          & $phpExe.FullName -c "$phpDir\\php.ini" -v

      - name: Build Windows installer
        run: npm run tauri build -- --bundles nsis

      - name: Smoke test bundled PHP startup on Windows
        shell: pwsh
        run: |
          $env:BELGESELSEMOFLIX_PORT = "8123"
          $stdoutLog = Join-Path $PWD "windows-startup-smoke.stdout.log"
          $stderrLog = Join-Path $PWD "windows-startup-smoke.stderr.log"
          $process = Start-Process -FilePath "cmd.exe" -ArgumentList "/c", "run.bat" -WorkingDirectory $PWD -PassThru -RedirectStandardOutput $stdoutLog -RedirectStandardError $stderrLog
          try {
            $ready = $false
            for ($i = 0; $i -lt 30; $i++) {
              Start-Sleep -Seconds 2
              if ($process.HasExited) {
                throw "run.bat erken kapandi. STDOUT:`n$(Get-Content $stdoutLog -Raw)`nSTDERR:`n$(Get-Content $stderrLog -Raw)"
              }
              try {
                $response = Invoke-WebRequest "http://127.0.0.1:8123/index.php" -UseBasicParsing -TimeoutSec 5
                $dataResponse = Invoke-WebRequest "http://127.0.0.1:8123/data-proxy.php?file=categories.json" -UseBasicParsing -TimeoutSec 20
                $largeDataResponse = Invoke-WebRequest "http://127.0.0.1:8123/data-proxy.php?file=all_documentaries.json" -UseBasicParsing -TimeoutSec 180
                if ($response.StatusCode -eq 200 -and $dataResponse.StatusCode -eq 200 -and $dataResponse.Content.Length -gt 10 -and $largeDataResponse.StatusCode -eq 200 -and $largeDataResponse.Content.Length -gt 1000) {
                  $ready = $true
                  break
                }
              } catch {
              }
            }
            if (-not $ready) {
              throw "Windows smoke test zamaninda hazir olmadi. STDOUT:`n$(Get-Content $stdoutLog -Raw)`nSTDERR:`n$(Get-Content $stderrLog -Raw)"
            }
          } finally {
            if (-not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
          }

      - name: Prepare Windows artifact bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "release-artifacts/windows" | Out-Null
          Copy-Item "src-tauri/target/release/bundle/nsis/*.exe" "release-artifacts/windows/" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: belgeselsemoflix-1.0-windows
          path: release-artifacts/windows/

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm install

      - name: Ensure PHP is available on macOS
        run: |
          brew list php >/dev/null 2>&1 || brew install php

      - name: Build macOS bundles
        run: npm run tauri build -- --bundles app,dmg

      - name: Capture macOS runtime logs and screenshots
        run: |
          mkdir -p screenshots diagnostic-reports
          APP_PATH="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "macOS uygulama paketi bulunamadi"
            exit 1
          fi

          EXECUTABLE_PATH="$APP_PATH/Contents/MacOS/BELGESELSEMOFLIX"
          "$EXECUTABLE_PATH" > macos-runtime.log 2>&1 &
          APP_PID=$!
          for index in 1 2 3 4; do
            sleep 15
            screencapture -x "screenshots/belgeselsemoflix-${index}.png"
          done
          kill "$APP_PID" || true
          wait "$APP_PID" || true
          find "$HOME/Library/Logs/DiagnosticReports" -maxdepth 1 \( -name 'BELGESELSEMOFLIX*.ips' -o -name 'BELGESELSEMOFLIX*.crash' \) -exec cp {} diagnostic-reports/ \; || true

      - name: Prepare macOS artifact bundle
        run: |
          rm -rf release-artifacts/macos
          mkdir -p release-artifacts/macos/bundle
          cp -R src-tauri/target/release/bundle/macos/*.app release-artifacts/macos/bundle/
          cp src-tauri/target/release/bundle/dmg/*.dmg release-artifacts/macos/bundle/
          cp -R screenshots release-artifacts/macos/macos-screenshots
          cp -R diagnostic-reports release-artifacts/macos/macos-diagnostic-reports
          cp macos-runtime.log release-artifacts/macos/

      - uses: actions/upload-artifact@v4
        with:
          name: belgeselsemoflix-1.0-macos
          path: release-artifacts/macos/
