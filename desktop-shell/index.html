<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BELGESELSEMOFLIX 1.0</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-base: #070809;
        --bg-panel: rgba(16, 19, 22, 0.92);
        --bg-panel-strong: rgba(18, 22, 25, 0.98);
        --bg-tab: rgba(255, 255, 255, 0.05);
        --bg-tab-active: linear-gradient(135deg, rgba(218, 19, 40, 0.88), rgba(120, 16, 24, 0.92));
        --border-soft: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 80, 96, 0.2);
        --text-primary: #f4f1ea;
        --text-muted: rgba(244, 241, 234, 0.68);
        --text-dim: rgba(244, 241, 234, 0.46);
        --accent: #ff3048;
        --accent-soft: rgba(255, 48, 72, 0.18);
        --shadow-lg: 0 32px 80px rgba(0, 0, 0, 0.4);
        font-family: "Segoe UI", "Helvetica Neue", sans-serif;
        background: #060708;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        color: var(--text-primary);
        background:
          radial-gradient(circle at top, rgba(160, 12, 28, 0.34), transparent 34%),
          linear-gradient(180deg, #16110f 0%, #090909 22%, #070809 100%);
      }

      .app-shell {
        position: relative;
        min-height: 100vh;
        display: grid;
        grid-template-rows: 58px 48px 1fr 34px;
      }

      .titlebar {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 0 10px 0 14px;
        background: linear-gradient(180deg, rgba(22, 15, 16, 0.96), rgba(14, 15, 18, 0.9));
        border-bottom: 1px solid var(--border-strong);
        backdrop-filter: blur(18px);
        box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.03);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .brand img {
        width: 24px;
        height: 24px;
        border-radius: 7px;
        box-shadow: 0 10px 22px rgba(255, 46, 62, 0.25);
      }

      .brand small {
        color: var(--text-dim);
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .window-title {
        text-align: center;
        font-size: 1rem;
        letter-spacing: 0.16em;
        font-weight: 600;
        color: rgba(244, 241, 234, 0.9);
        text-transform: uppercase;
      }

      .window-controls {
        justify-self: end;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .window-controls button {
        width: 34px;
        height: 34px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 11px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text-primary);
        cursor: pointer;
        transition: 160ms ease;
      }

      .window-controls button:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.16);
      }

      .window-controls button.close:hover {
        background: rgba(255, 58, 81, 0.18);
        border-color: rgba(255, 58, 81, 0.32);
      }

      .tabs {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 18px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        background: rgba(8, 10, 12, 0.8);
        backdrop-filter: blur(14px);
      }

      .tab {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
        height: 36px;
        padding: 0 16px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 999px;
        background: var(--bg-tab);
        color: var(--text-muted);
        font-size: 0.9rem;
        cursor: pointer;
        transition: 180ms ease;
      }

      .tab:hover {
        color: var(--text-primary);
        border-color: rgba(255, 255, 255, 0.12);
      }

      .tab.active {
        color: #fff;
        background: var(--bg-tab-active);
        border-color: rgba(255, 114, 129, 0.28);
        box-shadow: 0 14px 30px rgba(135, 16, 31, 0.24);
      }

      .tab.hidden {
        display: none;
      }

      .tab-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 240px;
      }

      .content {
        position: relative;
        overflow: hidden;
        background:
          radial-gradient(circle at top right, rgba(130, 19, 33, 0.16), transparent 30%),
          linear-gradient(180deg, rgba(17, 19, 22, 0.98), rgba(9, 10, 12, 1));
      }

      .status-overlay,
      .downloads-pane {
        position: absolute;
        inset: 18px;
        display: none;
        border: 1px solid var(--border-soft);
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(17, 20, 23, 0.96), rgba(11, 12, 14, 0.98));
        box-shadow: var(--shadow-lg);
        backdrop-filter: blur(18px);
      }

      .status-overlay.visible,
      .downloads-pane.visible {
        display: block;
      }

      .status-card {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      .status-card-inner {
        width: min(720px, calc(100% - 32px));
        padding: 34px 40px;
        border-radius: 28px;
        background:
          radial-gradient(circle at top, rgba(165, 21, 41, 0.16), transparent 42%),
          rgba(21, 22, 26, 0.88);
        border: 1px solid rgba(255, 255, 255, 0.08);
        text-align: center;
      }

      .status-chip {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 7px 14px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: #ffb3bc;
        font-size: 0.82rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .status-title {
        margin: 16px 0 10px;
        font-size: clamp(2rem, 4vw, 3.2rem);
        letter-spacing: 0.12em;
        font-weight: 800;
      }

      .status-text {
        margin: 0;
        color: var(--text-muted);
        line-height: 1.8;
        white-space: pre-wrap;
      }

      .downloads-pane {
        padding: 22px;
      }

      .downloads-head {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 18px;
      }

      .downloads-head h2 {
        margin: 0;
        font-size: 1.18rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .downloads-head p {
        margin: 6px 0 0;
        color: var(--text-muted);
      }

      .downloads-list {
        display: grid;
        gap: 12px;
      }

      .download-item {
        padding: 16px 18px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.035);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .download-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .download-name {
        font-weight: 600;
        word-break: break-word;
      }

      .download-status {
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        color: #ffd3d8;
        font-size: 0.82rem;
      }

      .download-path {
        margin-top: 10px;
        color: var(--text-dim);
        font-size: 0.85rem;
        word-break: break-all;
      }

      .empty-downloads {
        display: grid;
        place-items: center;
        min-height: 260px;
        color: var(--text-dim);
        text-align: center;
      }

      .footer {
        display: grid;
        place-items: center;
        font-size: 0.78rem;
        letter-spacing: 0.22em;
        color: rgba(244, 241, 234, 0.54);
        text-transform: uppercase;
        border-top: 1px solid rgba(255, 255, 255, 0.04);
        background: rgba(6, 7, 8, 0.94);
      }

      @media (max-width: 1100px) {
        .window-title {
          font-size: 0.86rem;
          letter-spacing: 0.12em;
        }

        .tab-label {
          max-width: 170px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="titlebar" data-tauri-drag-region>
        <div class="brand">
          <img src="app-icon.svg" alt="BELGESELSEMOFLIX" />
          <small>Masaustu Surumu</small>
        </div>
        <div class="window-title" id="windowTitle">BELGESELSEMOFLIX 1.0</div>
        <div class="window-controls">
          <button id="minimizeBtn" type="button" aria-label="Kucult">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M2 7h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
            </svg>
          </button>
          <button id="maximizeBtn" type="button" aria-label="Buyut">
            <svg id="maximizeIcon" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <rect x="2.3" y="2.3" width="9.4" height="9.4" rx="1.6" stroke="currentColor" stroke-width="1.3" />
            </svg>
          </button>
          <button id="closeBtn" class="close" type="button" aria-label="Kapat">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M3 3l8 8M11 3 3 11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
            </svg>
          </button>
        </div>
      </header>

      <nav class="tabs">
        <button class="tab active" id="homeTab" type="button" data-tab="home">
          <span class="tab-label">Ana Uygulama</span>
        </button>
        <button class="tab hidden" id="managedTab" type="button" data-tab="managed">
          <span class="tab-label" id="managedTabLabel">Ozel Sekme</span>
        </button>
        <button class="tab" id="downloadsTab" type="button" data-tab="downloads">
          <span class="tab-label">Indirmeler</span>
        </button>
      </nav>

      <main class="content">
        <section class="status-overlay visible" id="statusOverlay">
          <div class="status-card">
            <div class="status-card-inner">
              <div class="status-chip">Desktop Shell</div>
              <div class="status-title" id="statusTitle">Hazirlaniyor...</div>
              <p class="status-text" id="statusText">Yerel PHP sunucusu arka planda baslatiliyor.</p>
            </div>
          </div>
        </section>

        <section class="downloads-pane" id="downloadsPane">
          <div class="downloads-head">
            <div>
              <h2>Indirme Merkezi</h2>
              <p>fileq.net indirmeleri burada yonetilir ve kayit konumu secilir.</p>
            </div>
          </div>
          <div class="downloads-list" id="downloadsList"></div>
        </section>
      </main>

      <footer class="footer" id="footerText">BELGESELSEMO.COM.TR</footer>
    </div>

    <script>
      (() => {
        const invoke = (cmd, args = {}) => {
          const internal = window.__TAURI_INTERNALS__;
          if (!internal || typeof internal.invoke !== "function") {
            return Promise.reject(new Error("Tauri invoke bulunamadi"));
          }
          return internal.invoke(cmd, args);
        };

        const homeTab = document.getElementById("homeTab");
        const managedTab = document.getElementById("managedTab");
        const downloadsTab = document.getElementById("downloadsTab");
        const managedTabLabel = document.getElementById("managedTabLabel");
        const statusOverlay = document.getElementById("statusOverlay");
        const statusTitle = document.getElementById("statusTitle");
        const statusText = document.getElementById("statusText");
        const downloadsPane = document.getElementById("downloadsPane");
        const downloadsList = document.getElementById("downloadsList");
        const maximizeBtn = document.getElementById("maximizeBtn");

        function setActiveTab(tab) {
          [homeTab, managedTab, downloadsTab].forEach((button) => {
            button.classList.toggle("active", button.dataset.tab === tab);
          });
        }

        function renderDownloads(downloads) {
          if (!downloads.length) {
            downloadsList.innerHTML = `
              <div class="empty-downloads">
                <div>
                  <strong>Henuz aktif indirme yok.</strong>
                  <div style="margin-top:10px;">fileq.net uzerinden bir dosya baslatildiginda burada gorunecek.</div>
                </div>
              </div>
            `;
            return;
          }

          downloadsList.innerHTML = downloads
            .map(
              (item) => `
                <article class="download-item">
                  <div class="download-row">
                    <div class="download-name">${item.filename}</div>
                    <div class="download-status">${item.status}</div>
                  </div>
                  <div class="download-path">${item.destination || item.url}</div>
                </article>
              `,
            )
            .join("");
        }

        function setMaximizeIcon(isMaximized) {
          maximizeBtn.innerHTML = isMaximized
            ? `
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                <path d="M4 2.5h7.5V10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                <rect x="2.3" y="4.3" width="7.4" height="7.4" rx="1.4" stroke="currentColor" stroke-width="1.3"/>
              </svg>
            `
            : `
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                <rect x="2.3" y="2.3" width="9.4" height="9.4" rx="1.6" stroke="currentColor" stroke-width="1.3" />
              </svg>
            `;
        }

        window.__BELGESELSEMOFLIX_SHELL = {
          sync(snapshot) {
            document.title = snapshot.app_title;
            document.getElementById("windowTitle").textContent = snapshot.app_title;
            document.getElementById("footerText").textContent = snapshot.footer_text;
            statusTitle.textContent = snapshot.status_title;
            statusText.textContent = snapshot.status_detail;
            managedTabLabel.textContent = snapshot.managed_tab_label;
            managedTab.classList.toggle("hidden", !snapshot.managed_open);
            setActiveTab(snapshot.active_tab);
            setMaximizeIcon(snapshot.is_maximized);
            renderDownloads(snapshot.downloads || []);

            const showStatus = !snapshot.home_ready;
            statusOverlay.classList.toggle("visible", showStatus);
            downloadsPane.classList.toggle("visible", snapshot.active_tab === "downloads");
          },
        };

        document.querySelectorAll(".tab").forEach((button) => {
          button.addEventListener("click", () => {
            invoke("shell_select_tab", { tab: button.dataset.tab }).catch(console.error);
          });
        });

        document.getElementById("minimizeBtn").addEventListener("click", () => {
          invoke("shell_minimize").catch(console.error);
        });

        maximizeBtn.addEventListener("click", () => {
          invoke("shell_toggle_maximize").catch(console.error);
        });

        document.getElementById("closeBtn").addEventListener("click", () => {
          invoke("shell_close").catch(console.error);
        });

        invoke("shell_ready").catch(console.error);
      })();
    </script>
  </body>
</html>
