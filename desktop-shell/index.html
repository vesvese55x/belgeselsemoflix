<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BELGESELSEMOFLIX 1.0</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-root: #070809;
        --bg-panel: #0d1013;
        --bg-bar: rgba(20, 17, 18, 0.96);
        --text-primary: #f5f0e8;
        --text-muted: rgba(245, 240, 232, 0.65);
        --border-soft: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(229, 39, 61, 0.22);
        font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        color: var(--text-primary);
        background:
          radial-gradient(circle at top, rgba(165, 18, 34, 0.32), transparent 33%),
          linear-gradient(180deg, #16110f 0%, #090909 24%, #070809 100%);
      }

      .app-shell {
        width: 100%;
        height: 100vh;
        max-height: 100vh;
        display: grid;
        grid-template-rows: 58px 1fr 34px;
        overflow: hidden;
      }

      .titlebar,
      .footer {
        position: relative;
        z-index: 10;
      }

      .titlebar {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 0 10px 0 14px;
        background: var(--bg-bar);
        border-bottom: 1px solid var(--border-strong);
        backdrop-filter: blur(18px);
      }

      .drag-region {
        min-width: 0;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .brand img {
        width: 24px;
        height: 24px;
        border-radius: 7px;
      }

      .brand small {
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        color: var(--text-muted);
        text-transform: uppercase;
      }

      .window-title {
        text-align: center;
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .window-controls {
        justify-self: end;
        display: inline-flex;
        gap: 8px;
        pointer-events: auto;
      }

      .window-controls button {
        width: 34px;
        height: 34px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 11px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text-primary);
        cursor: pointer;
        transition: 150ms ease;
        pointer-events: auto;
      }

      .window-controls button:hover {
        background: rgba(255, 255, 255, 0.08);
      }

      .window-controls .close:hover {
        background: rgba(255, 58, 81, 0.18);
      }

      .content {
        position: relative;
        min-height: 0;
        height: 100%;
        overflow: hidden;
        background: var(--bg-panel);
      }

      .pane {
        position: absolute;
        inset: 0;
        display: block;
        background:
          radial-gradient(circle at top right, rgba(122, 19, 34, 0.18), transparent 26%),
          #0c1013;
      }

      .pane iframe {
        width: 100%;
        height: 100%;
        min-height: 0;
        border: 0;
        display: block;
        background: #0c1013;
      }

      .status-overlay {
        position: absolute;
        inset: 18px;
        display: none;
        place-items: center;
        border-radius: 24px;
        border: 1px solid var(--border-soft);
        background: linear-gradient(180deg, rgba(17, 20, 23, 0.96), rgba(11, 12, 14, 0.98));
        z-index: 20;
      }

      .status-overlay.visible {
        display: grid;
      }

      .status-card {
        width: min(720px, calc(100% - 32px));
        padding: 34px 40px;
        text-align: center;
        border-radius: 28px;
        background:
          radial-gradient(circle at top, rgba(165, 21, 41, 0.16), transparent 42%),
          rgba(21, 22, 26, 0.88);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .status-chip {
        display: inline-flex;
        padding: 7px 14px;
        border-radius: 999px;
        background: rgba(255, 48, 72, 0.18);
        color: #ffb3bc;
        font-size: 0.82rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .status-title {
        margin: 16px 0 10px;
        font-size: clamp(2rem, 4vw, 3.2rem);
        font-weight: 800;
        letter-spacing: 0.12em;
      }

      .status-text {
        margin: 0;
        color: var(--text-muted);
        line-height: 1.7;
        white-space: pre-wrap;
      }

      .empty-pane {
        height: 100%;
        display: grid;
        place-items: center;
        text-align: center;
        color: var(--text-muted);
        padding: 32px;
      }

      .footer {
        display: grid;
        place-items: center;
        border-top: 1px solid rgba(255, 255, 255, 0.04);
        background: rgba(6, 7, 8, 0.94);
        color: rgba(245, 240, 232, 0.54);
        font-size: 0.78rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="titlebar">
        <div class="drag-region" data-tauri-drag-region>
          <div class="brand">
            <img src="app-icon.svg" alt="BELGESELSEMOFLIX" />
            <small id="headerClock">--.--.-- --:--</small>
          </div>
        </div>
        <div class="window-title drag-region" id="windowTitle" data-tauri-drag-region">BELGESELSEMOFLIX 1.0</div>
        <div class="window-controls">
          <button id="minimizeBtn" type="button" aria-label="Kucult">-</button>
          <button id="maximizeBtn" type="button" aria-label="Buyut">+</button>
          <button id="closeBtn" class="close" type="button" aria-label="Kapat">x</button>
        </div>
      </header>

      <main class="content">
        <section class="pane" id="homePane">
          <iframe
            id="homeFrame"
            title="Ana Uygulama"
            referrerpolicy="no-referrer"
            allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
            allowfullscreen
          ></iframe>
        </section>

        <section class="status-overlay visible" id="statusOverlay">
          <div class="status-card">
            <div class="status-chip">Desktop Shell</div>
            <div class="status-title" id="statusTitle">Hazirlaniyor...</div>
            <p class="status-text" id="statusText">Yerel PHP sunucusu arka planda baslatiliyor.</p>
          </div>
        </section>
      </main>

      <footer class="footer" id="footerText">BELGESELSEMO.COM.TR</footer>
    </div>

    <script>
      (() => {
        const invoke = (cmd, args = {}) => {
          const internal = window.__TAURI_INTERNALS__;
          if (!internal || typeof internal.invoke !== "function") {
            return Promise.reject(new Error("Tauri invoke bulunamadi"));
          }
          return internal.invoke(cmd, args);
        };

        const state = {
          homeLoaded: false,
          lastHomeUrl: null,
        };

        const homeFrame = document.getElementById("homeFrame");
        const headerClock = document.getElementById("headerClock");
        const statusOverlay = document.getElementById("statusOverlay");
        const statusTitle = document.getElementById("statusTitle");
        const statusText = document.getElementById("statusText");
        const maximizeBtn = document.getElementById("maximizeBtn");

        function updateClock() {
          const now = new Date();
          const pad = (value) => String(value).padStart(2, "0");
          headerClock.textContent = `${pad(now.getDate())}.${pad(now.getMonth() + 1)}.${String(now.getFullYear()).slice(-2)} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
        }

        function setMaximizeLabel(isMaximized) {
          maximizeBtn.textContent = isMaximized ? "[]" : "+";
        }

        function refreshOverlay(snapshot) {
          const startupFailed = snapshot.status_title === "Baslatma Hatasi";
          const shouldShow = startupFailed || !state.homeLoaded;
          statusOverlay.classList.toggle("visible", shouldShow);
        }

        homeFrame.addEventListener("load", () => {
          state.homeLoaded = true;
          statusOverlay.classList.remove("visible");
        });

        window.__BELGESELSEMOFLIX_SHELL = {
          sync(snapshot) {
            document.title = snapshot.app_title;
            document.getElementById("windowTitle").textContent = snapshot.app_title;
            document.getElementById("footerText").textContent = snapshot.footer_text;
            statusTitle.textContent = snapshot.status_title;
            statusText.textContent = snapshot.status_detail;
            setMaximizeLabel(snapshot.is_maximized);

            if (snapshot.home_url && snapshot.home_url !== state.lastHomeUrl) {
              state.lastHomeUrl = snapshot.home_url;
              state.homeLoaded = false;
              homeFrame.src = snapshot.home_url;
            }

            refreshOverlay(snapshot);
          },
        };

        document.getElementById("minimizeBtn").addEventListener("click", () => {
          invoke("shell_minimize").catch(console.error);
        });
        document.getElementById("minimizeBtn").addEventListener("mousedown", (event) => {
          event.preventDefault();
          event.stopPropagation();
        });

        maximizeBtn.addEventListener("click", () => {
          invoke("shell_toggle_maximize").catch(console.error);
        });
        maximizeBtn.addEventListener("mousedown", (event) => {
          event.preventDefault();
          event.stopPropagation();
        });

        document.getElementById("closeBtn").addEventListener("click", () => {
          invoke("shell_close").catch(console.error);
        });
        document.getElementById("closeBtn").addEventListener("mousedown", (event) => {
          event.preventDefault();
          event.stopPropagation();
        });

        window.addEventListener("message", (event) => {
          const data = event.data;
          if (!data || data.type !== "belgeselsemoflix-shell-command" || !data.payload) {
            return;
          }

          const { command, args } = data.payload;
          if (command === "desktop_open_managed_url") {
            invoke("desktop_open_managed_url", args || {}).catch(console.error);
          }
        });

        invoke("shell_ready").catch(console.error);
        updateClock();
        setInterval(updateClock, 1000);
      })();
    </script>
  </body>
</html>
