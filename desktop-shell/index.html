<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BELGESELSEMOFLIX 1.0</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, sans-serif;
        background: #111;
        color: #f5f5f5;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(229, 9, 20, 0.25), transparent 35%),
          linear-gradient(180deg, #1c1c1c, #090909);
      }

      main {
        text-align: center;
        padding: 32px;
        width: min(92vw, 720px);
      }

      h1 {
        margin: 0 0 12px;
        letter-spacing: 0.08em;
      }

      p {
        margin: 0 0 10px;
        opacity: 0.8;
        line-height: 1.5;
      }

      .panel {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }

      .status {
        color: #ffd166;
        font-weight: 700;
      }

      .detail {
        font-size: 0.95rem;
        white-space: pre-wrap;
      }

      .hint {
        font-size: 0.9rem;
        opacity: 0.65;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="panel">
        <h1>BELGESELSEMOFLIX 1.0</h1>
        <p id="status" class="status">Hazirlaniyor...</p>
        <p id="detail" class="detail">Yerel PHP sunucusu arka planda baslatiliyor.</p>
        <p class="hint">Ilk acilista gerekli araclar yukleniyorsa bu ekran biraz bekleyebilir.</p>
      </div>
    </main>
    <script>
      window.__BELGESELSEMOFLIX_SET_STATUS = (status, detail) => {
        document.getElementById("status").textContent = status;
        document.getElementById("detail").textContent = detail;
      };
    </script>
  </body>
</html>
