<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BELGESELSEMO ÇEVİRİ</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <style>
        :root {
            --bg-color: #141414;
            --surface-color: #1f1f1f;
            --surface-hover: #2a2a2a;
            --primary-color: #e50914;
            --primary-hover: #b81d24;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --border-color: #333;
            --glass-bg: rgba(20, 20, 20, 0.95);
            --radius: 8px;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #666;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 100vh;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(45deg, #e50914, #ff5f6d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .status-badge {
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 4px;
            background: var(--surface-color);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
        }

        .status-dot.online {
            background: #4caf50;
            box-shadow: 0 0 8px #4caf50;
        }

        .status-dot.offline {
            background: #ff9800;
            box-shadow: 0 0 8px #ff9800;
        }

        .status-dot.error {
            background: #f44336;
        }

        /* Main Translation Area */
        .translation-wrapper {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            flex: 1;
        }

        @media (max-width: 768px) {
            .translation-wrapper {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto;
            }
        }

        .panel {
            background: var(--surface-color);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: var(--transition);
        }

        .panel:focus-within {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(229, 9, 20, 0.2);
        }

        .panel-header {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .lang-select {
            background: transparent;
            color: var(--text-primary);
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .lang-select:hover {
            background: var(--surface-hover);
        }

        .panel-tools {
            display: flex;
            gap: 5px;
        }

        .tool-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            width: 32px;
            height: 32px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .tool-btn:hover {
            background: var(--surface-hover);
            color: var(--text-primary);
        }

        .textarea-container {
            flex: 1;
            position: relative;
            min-height: 300px;
        }

        textarea,
        .output-div {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 20px;
            font-size: 1.2rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            font-family: inherit;
        }

        .output-div {
            white-space: pre-wrap;
            overflow-y: auto;
        }

        .placeholder-text {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #555;
            pointer-events: none;
            font-size: 1.2rem;
        }

        /* Middle Controls */
        .controls {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }

        @media (max-width: 768px) {
            .controls {
                flex-direction: row;
            }
        }

        .swap-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .swap-btn:hover {
            background: var(--surface-hover);
            color: var(--primary-color);
            transform: rotate(180deg);
        }

        .translate-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .translate-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(229, 9, 20, 0.4);
        }

        .translate-btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* File Upload */
        .file-upload-area {
            border: 2px dashed var(--border-color);
            border-radius: var(--radius);
            padding: 30px;
            text-align: center;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            background: rgba(255, 255, 255, 0.02);
            margin-top: 20px;
        }

        .file-upload-area:hover,
        .file-upload-area.dragover {
            border-color: var(--primary-color);
            background: rgba(229, 9, 20, 0.05);
            color: var(--text-primary);
        }

        .file-icon {
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        /* Progress Bar */
        .progress-container {
            height: 4px;
            background: var(--surface-color);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
            display: none;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
        }

        .language-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
        }

        .lang-option {
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .lang-option:hover {
            background: var(--surface-hover);
            border-color: var(--border-color);
        }

        .lang-option.active {
            background: rgba(229, 9, 20, 0.1);
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 12px 24px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast-icon {
            color: var(--primary-color);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="brand">
                <i class="fas fa-language fa-2x" style="color: var(--primary-color)"></i>
                <h1>BELGESELSEMO ÇEVİRİ</h1>
            </div>
            <div class="status-badge" id="connectionStatus">
                <div class="status-dot online"></div>
                <span>Online Mod</span>
            </div>
        </header>

        <div class="translation-wrapper">
            <!-- Source Panel -->
            <div class="panel">
                <div class="panel-header">
                    <button class="lang-select" id="sourceLangBtn">
                        <span id="sourceLangLabel">İngilizce</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="panel-tools">
                        <button class="tool-btn" onclick="app.pasteText()" title="Yapıştır"><i
                                class="fas fa-paste"></i></button>
                        <button class="tool-btn" onclick="app.speak('source')" title="Dinle"><i
                                class="fas fa-volume-up"></i></button>
                        <button class="tool-btn" onclick="app.clearText()" title="Temizle"><i
                                class="fas fa-times"></i></button>
                    </div>
                </div>
                <div class="textarea-container">
                    <textarea id="sourceText"
                        placeholder="Çevirmek istediğiniz metni buraya yazın veya yapıştırın..."></textarea>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button class="swap-btn" onclick="app.swapLanguages()" title="Dilleri Değiştir">
                    <i class="fas fa-exchange-alt"></i>
                </button>
                <button class="translate-btn" id="translateBtn" onclick="app.handleTranslate()">
                    <span>ÇEVİR</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>

            <!-- Target Panel -->
            <div class="panel">
                <div class="panel-header">
                    <button class="lang-select" id="targetLangBtn">
                        <span id="targetLangLabel">Türkçe</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="panel-tools">
                        <button class="tool-btn" onclick="app.copyText()" title="Kopyala"><i
                                class="fas fa-copy"></i></button>
                        <button class="tool-btn" onclick="app.speak('target')" title="Dinle"><i
                                class="fas fa-volume-up"></i></button>
                        <button class="tool-btn" onclick="app.downloadAudio()" title="İndir"><i
                                class="fas fa-download"></i></button>
                    </div>
                </div>
                <div class="textarea-container">
                    <div id="targetText" class="output-div"></div>
                    <div id="placeholderText" class="placeholder-text">Çeviri burada görünecek...</div>
                </div>
            </div>
        </div>

        <!-- File Upload -->
        <div class="file-upload-area" id="dropZone">
            <i class="fas fa-cloud-upload-alt file-icon"></i>
            <h3>Dosya Yükle</h3>
            <p>PDF, DOCX, TXT veya SRT dosyalarını sürükleyip bırakın</p>
            <input type="file" id="fileInput" hidden accept=".pdf,.docx,.txt,.srt,.epub">
            <div class="progress-container" id="fileProgress">
                <div class="progress-bar" id="fileProgressBar"></div>
            </div>
        </div>
    </div>

    <!-- Language Modal -->
    <div class="modal-overlay" id="langModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Dil Seçimi</h3>
                <button class="close-modal" onclick="app.closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="language-grid" id="langGrid">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fas fa-info-circle toast-icon"></i>
        <span id="toastMessage">İşlem başarılı</span>
    </div>

    <!-- Main Script Placeholder -->
    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0';

        // Configuration
        env.allowLocalModels = false;
        env.useBrowserCache = true;

        // Worker Code for Transformers.js
        const workerCode = `
            import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0';
            
            env.allowLocalModels = false;
            env.useBrowserCache = true;

            class TranslationPipeline {
                static task = 'translation';
                static model = 'Xenova/nllb-200-distilled-600M';
                static instance = null;

                static async getInstance(progress_callback = null) {
                    if (this.instance === null) {
                        this.instance = await pipeline(this.task, this.model, { progress_callback });
                    }
                    return this.instance;
                }
            }

            self.addEventListener('message', async (event) => {
                const { text, src_lang, tgt_lang, type } = event.data;

                if (type === 'load') {
                    try {
                        await TranslationPipeline.getInstance(x => {
                            self.postMessage({ status: 'progress', data: x });
                        });
                        self.postMessage({ status: 'ready' });
                    } catch (e) {
                        self.postMessage({ status: 'error', data: e.message });
                    }
                    return;
                }

                if (type === 'translate') {
                    try {
                        const translator = await TranslationPipeline.getInstance();
                        const output = await translator(text, {
                            src_lang: src_lang,
                            tgt_lang: tgt_lang,
                        });
                        self.postMessage({ status: 'complete', output: output[0].translation_text });
                    } catch (e) {
                        self.postMessage({ status: 'error', data: e.message });
                    }
                }
            });
        `;

        // Create Worker
        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const worker = new Worker(URL.createObjectURL(blob), { type: 'module' });

        // App Class
        class TranslationApp {
            constructor() {
                this.sourceLang = 'eng_Latn'; // NLLB codes
                this.targetLang = 'tur_Latn';
                this.isOfflineReady = false;
                this.isModelLoading = false;
                this.debounceTimer = null;

                // NLLB Language Map (Simplified for UI)
                this.languages = {
                    'tur_Latn': { name: 'Türkçe', flag: '🇹🇷', code: 'tr' },
                    'eng_Latn': { name: 'İngilizce', flag: '🇬🇧', code: 'en' },
                    'deu_Latn': { name: 'Almanca', flag: '🇩🇪', code: 'de' },
                    'fra_Latn': { name: 'Fransızca', flag: '🇫🇷', code: 'fr' },
                    'spa_Latn': { name: 'İspanyolca', flag: '🇪🇸', code: 'es' },
                    'ita_Latn': { name: 'İtalyanca', flag: '🇮🇹', code: 'it' },
                    'rus_Cyrl': { name: 'Rusça', flag: '🇷🇺', code: 'ru' },
                    'jpn_Jpan': { name: 'Japonca', flag: '🇯🇵', code: 'ja' },
                    'zho_Hans': { name: 'Çince', flag: '🇨🇳', code: 'zh' },
                    'kor_Hang': { name: 'Korece', flag: '🇰🇷', code: 'ko' },
                    'ara_Arab': { name: 'Arapça', flag: '🇸🇦', code: 'ar' },
                    'ell_Grek': { name: 'Yunanca', flag: '🇬🇷', code: 'el' },
                    'bul_Cyrl': { name: 'Bulgarca', flag: '🇧🇬', code: 'bg' },
                    'aze_Latn': { name: 'Azerice', flag: '🇦🇿', code: 'az' }
                };

                this.init();
            }

            init() {
                this.setupEventListeners();
                this.setupWorkerListeners();
                this.updateUILabels();
            }

            setupEventListeners() {
                // Text Input
                document.getElementById('sourceText').addEventListener('input', (e) => {
                    this.handleInput(e.target.value);
                });

                // Language Buttons
                document.getElementById('sourceLangBtn').addEventListener('click', () => this.openLangModal('source'));
                document.getElementById('targetLangBtn').addEventListener('click', () => this.openLangModal('target'));

                // File Upload
                const dropZone = document.getElementById('dropZone');
                const fileInput = document.getElementById('fileInput');

                dropZone.addEventListener('click', () => fileInput.click());
                fileInput.addEventListener('change', (e) => this.handleFileUpload(e.target.files[0]));

                dropZone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    dropZone.classList.add('dragover');
                });

                dropZone.addEventListener('dragleave', () => {
                    dropZone.classList.remove('dragover');
                });

                dropZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    dropZone.classList.remove('dragover');
                    if (e.dataTransfer.files.length) {
                        this.handleFileUpload(e.dataTransfer.files[0]);
                    }
                });

                // Close Modal Overlay
                document.getElementById('langModal').addEventListener('click', (e) => {
                    if (e.target === document.getElementById('langModal')) {
                        this.closeModal();
                    }
                });
            }

            setupWorkerListeners() {
                worker.onmessage = (e) => {
                    const { status, data, output } = e.data;

                    if (status === 'progress') {
                        if (data.status === 'initiate') {
                            this.showToast('AI Modeli indiriliyor... (Bu işlem bir kez yapılır)', 'info');
                        }
                    }

                    if (status === 'ready') {
                        this.isOfflineReady = true;
                        this.isModelLoading = false;
                        this.updateConnectionStatus(true);
                        this.showToast('AI Modeli Hazır! Çeviriler artık %100 Offline.', 'success');

                        // Retrigger translation if pending
                        const text = document.getElementById('sourceText').value;
                        if (text) this.handleTranslate();
                    }

                    if (status === 'complete') {
                        this.setTargetText(output);
                        document.getElementById('translateBtn').disabled = false;
                        document.getElementById('translateBtn').innerHTML = '<span>ÇEVİR</span><i class="fas fa-arrow-right"></i>';
                    }

                    if (status === 'error') {
                        console.error('Worker Error:', data);
                        this.isModelLoading = false;
                        this.translateWithAPI();
                    }
                };
            }

            updateConnectionStatus(isOffline) {
                const badge = document.getElementById('connectionStatus');
                const dot = badge.querySelector('.status-dot');
                const text = badge.querySelector('span');

                if (isOffline) {
                    dot.className = 'status-dot offline';
                    text.textContent = 'Offline Mod (AI)';
                    badge.style.borderColor = '#ff9800';
                } else {
                    dot.className = 'status-dot online';
                    text.textContent = 'Online Mod (API)';
                    badge.style.borderColor = '#4caf50';
                }
            }

            handleInput(text) {
                if (this.debounceTimer) clearTimeout(this.debounceTimer);
                this.debounceTimer = setTimeout(() => {
                    if (text.trim().length > 0) {
                        this.handleTranslate();
                    } else {
                        this.setTargetText('');
                    }
                }, 800);
            }

            handleTranslate() {
                const text = document.getElementById('sourceText').value.trim();
                if (!text) return;

                document.getElementById('translateBtn').disabled = true;
                document.getElementById('translateBtn').innerHTML = '<div class="spinner"></div><span>ÇEVRİLİYOR...</span>';

                // Check if we can use Offline AI
                // We use AI if model is ready OR if we want to force load it
                // For this demo, we try AI first if languages match EN/TR
                const isEnTr = (this.sourceLang === 'eng_Latn' && this.targetLang === 'tur_Latn') ||
                    (this.sourceLang === 'tur_Latn' && this.targetLang === 'eng_Latn');

                if (isEnTr) {
                    if (!this.isOfflineReady && !this.isModelLoading) {
                        // First time load
                        this.isModelLoading = true;
                        worker.postMessage({ type: 'load' });
                        // We also start API translation while waiting
                        this.translateWithAPI();
                    } else if (this.isOfflineReady) {
                        worker.postMessage({
                            type: 'translate',
                            text: text,
                            src_lang: this.sourceLang,
                            tgt_lang: this.targetLang
                        });
                    } else {
                        // Loading in progress, use API
                        this.translateWithAPI();
                    }
                } else {
                    // Other languages use API
                    this.translateWithAPI();
                }
            }

            async translateWithAPI() {
                const text = document.getElementById('sourceText').value.trim();
                const src = this.languages[this.sourceLang].code;
                const tgt = this.languages[this.targetLang].code;

                try {
                    const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${src}|${tgt}`);
                    const data = await response.json();

                    if (data.responseStatus === 200) {
                        this.setTargetText(data.responseData.translatedText);
                        this.updateConnectionStatus(false); // Using API
                    } else {
                        throw new Error(data.responseDetails);
                    }
                } catch (error) {
                    console.error('API Error:', error);
                    this.showToast('Çeviri hatası: ' + error.message, 'error');
                } finally {
                    document.getElementById('translateBtn').disabled = false;
                    document.getElementById('translateBtn').innerHTML = '<span>ÇEVİR</span><i class="fas fa-arrow-right"></i>';
                }
            }

            setTargetText(text) {
                document.getElementById('targetText').textContent = text;
                document.getElementById('placeholderText').style.display = text ? 'none' : 'block';
            }

            openLangModal(type) {
                this.currentModalType = type;
                const grid = document.getElementById('langGrid');
                grid.innerHTML = '';

                Object.entries(this.languages).forEach(([key, lang]) => {
                    const div = document.createElement('div');
                    div.className = `lang-option ${key === (type === 'source' ? this.sourceLang : this.targetLang) ? 'active' : ''}`;
                    div.innerHTML = `<div style="font-size: 2rem; margin-bottom: 5px;">${lang.flag}</div><div>${lang.name}</div>`;
                    div.onclick = () => this.selectLanguage(key);
                    grid.appendChild(div);
                });

                document.getElementById('langModal').style.display = 'flex';
            }

            closeModal() {
                document.getElementById('langModal').style.display = 'none';
            }

            selectLanguage(key) {
                if (this.currentModalType === 'source') {
                    this.sourceLang = key;
                } else {
                    this.targetLang = key;
                }
                this.updateUILabels();
                this.closeModal();
                this.handleTranslate();
            }

            updateUILabels() {
                document.getElementById('sourceLangLabel').textContent = this.languages[this.sourceLang].name;
                document.getElementById('targetLangLabel').textContent = this.languages[this.targetLang].name;
            }

            swapLanguages() {
                const temp = this.sourceLang;
                this.sourceLang = this.targetLang;
                this.targetLang = temp;

                const sourceText = document.getElementById('sourceText').value;
                const targetText = document.getElementById('targetText').textContent;

                document.getElementById('sourceText').value = targetText;
                this.setTargetText(sourceText);

                this.updateUILabels();
                this.handleTranslate();
            }

            copyText() {
                const text = document.getElementById('targetText').textContent;
                if (text) {
                    navigator.clipboard.writeText(text);
                    this.showToast('Kopyalandı', 'success');
                }
            }

            async pasteText() {
                try {
                    const text = await navigator.clipboard.readText();
                    document.getElementById('sourceText').value = text;
                    this.handleTranslate();
                } catch (e) {
                    this.showToast('Yapıştırma izni verilmedi', 'error');
                }
            }

            clearText() {
                document.getElementById('sourceText').value = '';
                this.setTargetText('');
            }

            speak(type) {
                const text = type === 'source' ?
                    document.getElementById('sourceText').value :
                    document.getElementById('targetText').textContent;

                if (!text) return;

                const langKey = type === 'source' ? this.sourceLang : this.targetLang;
                const langCode = this.languages[langKey].code;

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = langCode;
                speechSynthesis.speak(utterance);
            }

            downloadAudio() {
                // Simple TTS download simulation or implementation
                // Since browser TTS doesn't easily export to file, we'll show a toast
                this.showToast('Ses dosyası indirme özelliği şu an tarayıcı kısıtlaması nedeniyle devre dışı.', 'info');
            }

            async handleFileUpload(file) {
                if (!file) return;

                this.showToast('Dosya işleniyor...', 'info');
                document.getElementById('fileProgress').style.display = 'block';
                document.getElementById('fileProgressBar').style.width = '50%';

                try {
                    let text = '';
                    if (file.name.endsWith('.pdf')) {
                        const arrayBuffer = await file.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                        let fullText = '';
                        for (let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const content = await page.getTextContent();
                            fullText += content.items.map(item => item.str).join(' ') + '\n';
                        }
                        text = fullText;
                    } else if (file.name.endsWith('.docx')) {
                        const arrayBuffer = await file.arrayBuffer();
                        const result = await mammoth.extractRawText({ arrayBuffer });
                        text = result.value;
                    } else {
                        text = await file.text();
                    }

                    document.getElementById('sourceText').value = text;
                    document.getElementById('fileProgressBar').style.width = '100%';
                    setTimeout(() => {
                        document.getElementById('fileProgress').style.display = 'none';
                    }, 1000);

                    this.handleTranslate();
                    this.showToast('Dosya yüklendi', 'success');
                } catch (e) {
                    console.error(e);
                    this.showToast('Dosya okuma hatası', 'error');
                    document.getElementById('fileProgress').style.display = 'none';
                }
            }

            showToast(msg, type = 'info') {
                const toast = document.getElementById('toast');
                const icon = toast.querySelector('i');
                const text = document.getElementById('toastMessage');

                text.textContent = msg;
                icon.className = type === 'success' ? 'fas fa-check-circle' :
                    type === 'error' ? 'fas fa-exclamation-circle' :
                        'fas fa-info-circle';
                icon.style.color = type === 'success' ? '#4caf50' :
                    type === 'error' ? '#f44336' :
                        'var(--primary-color)';

                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            }
        }

        // Initialize
        window.app = new TranslationApp();
    </script>
</body>

</html>
